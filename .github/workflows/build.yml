name: Compilar APK Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o Repositorio
        uses: actions/checkout@v4

      - name: Limpar Espaco em Disco (Evitar falta de espaco para o NDK/SDK)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Verificar Espaco em Disco
        run: df -h

      - name: Cache do Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Instalar Dependencias do Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libjpeg-dev libpng-dev libncurses5-dev libssl-dev cmake libffi-dev libgomp1
          pip install --upgrade pip
          pip install buildozer "cython<3.0"

      - name: Compilar APK com Buildozer
        run: |
          # Evita conflitos com caminhos de SDK/NDK predefinidos no runner do GitHub
          unset ANDROID_SDK_ROOT
          unset ANDROID_NDK_ROOT
          # Aceita licenças do Android SDK automaticamente
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          # Executa o buildozer para compilar o APK em modo de debug
          buildozer -v android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"

      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: jogo-da-memoria-apk
          path: bin/*.apk
