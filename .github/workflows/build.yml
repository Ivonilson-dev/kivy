name: Compilar APK Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o Repositorio
        uses: actions/checkout@v3

      - name: Cache do Buildozer
        uses: actions/cache@v3
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Instalar Dependencias do Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgomp1
          pip install --upgrade pip
          pip install buildozer cython

      - name: Compilar APK com Buildozer
        run: |
          # Aceita licenças do Android SDK automaticamente
          export APP_ANDROID_ACCEPT_SDK_LICENSE=y
          # Executa o buildozer para compilar o APK em modo de debug
          buildozer -v android debug

      - name: Upload do APK
        uses: actions/upload-artifact@v3
        with:
          name: jogo-da-memoria-apk
          path: bin/*.apk
